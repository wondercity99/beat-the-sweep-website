<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="dist/output.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Manrope', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Navigation -->
  <nav class="fixed w-full bg-white/95 backdrop-blur-sm z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center">
          <a href="/" class="flex items-center space-x-2">
            <img src="images/logo-512-clear.png" alt="Beat the Sweep" style="height: 5rem;" class="w-auto">
            <span style="font-size: 1.5rem;" class="font-bold text-gray-900">Beat the Sweep</span>
          </a>
        </div>
        <div class="hidden md:flex items-center space-x-8">
          <a href="/lancaster" class="nav-link">Lancaster Map</a>
          <a href="/sweep-faqs" class="nav-link">Sweep FAQs</a>
          <a href="/game" class="nav-link">Game</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <main class="pt-32 pb-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="max-w-xl mx-auto text-center">
        <!-- Contact Box -->
        <div class="bg-white rounded-2xl shadow-lg p-8 md:p-12">
          <video
            src="images/Beat-the-Sweep-animated.mp4"
            autoplay muted loop playsinline
            class="w-full max-w-sm mx-auto mb-8 block"
            aria-label="Beat the Sweep animation">
          </video>
          <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-4">Email Us for Support<br>or General Inquiries</h1>
          <a href="mailto:beatthesweep@proton.me" class="text-xl text-sweep-blue hover:underline">beatthesweep@proton.me</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col md:flex-row justify-between items-center">
        <div class="flex items-center space-x-2 mb-4 md:mb-0">
          <span class="text-white font-semibold">Beat the Sweep</span>
        </div>
        <div class="flex space-x-6 text-sm">
          <a href="privacy.html" class="hover:text-white transition-colors">Privacy Policy</a>
          <a href="terms.html" class="hover:text-white transition-colors">Terms of Service</a>
          <a href="delete-account.html" class="hover:text-white transition-colors">Delete Account</a>
          <a href="contact.html" class="hover:text-white transition-colors">Contact</a>
        </div>
      </div>
      <div class="text-center text-sm mt-6">
        <p>&copy; 2026 Beat the Sweep. All rights reserved.</p>
      </div>
    </div>

</html>
